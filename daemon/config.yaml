# argb-to-hue daemon configuration
# Developed on macOS, intended to run on modern Linux.

openrgb:
  # If the daemon runs on the same machine as OpenRGB, use 127.0.0.1.
  # If the ESP32 is plugged into a different host, point this at the
  # machine running OpenRGB (e.g. 192.168.1.23).
  host: 127.0.0.1
  port: 6742

serial:
  # Set to a specific port (e.g. /dev/ttyACM0 on Linux, /dev/tty.usbmodem* on macOS)
  # or leave empty/null to auto-detect an argb-to-hue device.
  port: null
  baud: 115200
  # Prefix used by the firmware on every data line.
  prefix: "DATA: "

endpoints:
  # endpoint number -> OpenRGB mapping
  # The firmware exposes one Hue gradient endpoint (11).
  # OpenRGB profile argb-to-hue.orp:
  #   0: JAF      -> global motherboard zone, leave untouched
  #   1: JARGB 1 -> 6 LEDs
  #   2: JARGB 2 -> 48 LEDs split into 12 LED segments:
  #      VRM [0:12], Right [12:24], Center [24:36], Left [36:48]
  #   3: JARGB 3 -> 6 LEDs
  11:
    name: "VRM"
    device: "MSI MYSTIC LIGHT"
    zone: 2
    segment: "VRM"
    segment_start: 0
    leds: 12

# If true, attempt to switch matched devices into Direct/Custom mode before
# setting colors.
set_direct_mode: true
